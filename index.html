<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@tanyaappa — Rekomendasi Produk Favorit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brown-900: #3D2B1F;
            --brown-800: #5C3D2E;
            --brown-700: #795548;
            --brown-600: #8D6E63;
            --brown-500: #A1887F;
            --brown-400: #BCAAA4;
            --brown-300: #D7CCC8;
            --brown-200: #EFEBE9;
            --brown-100: #F5F0ED;
            --brown-50: #FAF8F6;
            --sage-700: #5F6B5E;
            --sage-600: #7A8B72;
            --sage-500: #8FA387;
            --sage-400: #A8BCA0;
            --sage-300: #C1D4B9;
            --sage-200: #D9E8D2;
            --sage-100: #ECF3E8;
            --sage-50: #F5F9F3;
            --accent: #8D6E63;
            --accent-sage: #7A8B72;
            --text-primary: #3D2B1F;
            --text-secondary: #795548;
            --text-muted: #A1887F;
            --bg-main: #FAF8F6;
            --bg-card: #FFFFFF;
            --shadow-soft: 0 2px 16px rgba(61, 43, 31, 0.06);
            --shadow-hover: 0 8px 32px rgba(61, 43, 31, 0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-pill: 50px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Background texture */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 0%, var(--sage-100) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, var(--brown-200) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 16px 40px;
            position: relative;
            z-index: 1;
        }

        /* ===== HEADER / PROFILE ===== */
        .profile-header {
            text-align: center;
            padding: 48px 0 32px;
            animation: fadeInDown 0.8s ease;
        }

        .profile-photo-wrapper {
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--sage-400), var(--brown-400));
            padding: 4px;
            animation: float 4s ease-in-out infinite;
        }

        .profile-photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: var(--brown-200);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            border: 3px solid var(--bg-main);
        }

        .profile-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--brown-900);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .profile-bio {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
            max-width: 300px;
            margin: 0 auto 16px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .social-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1.5px solid var(--brown-300);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--brown-700);
        }

        .social-btn:hover {
            background: var(--brown-900);
            color: white;
            border-color: var(--brown-900);
            transform: translateY(-2px);
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
        }

        /* ===== SEARCH BAR ===== */
        .search-wrapper {
            margin: 0 0 20px;
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        .search-bar {
            width: 100%;
            padding: 14px 20px 14px 48px;
            border: 1.5px solid var(--brown-300);
            border-radius: var(--radius-pill);
            background: var(--bg-card);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s ease;
        }

        .search-bar::placeholder {
            color: var(--text-muted);
        }

        .search-bar:focus {
            border-color: var(--sage-500);
            box-shadow: 0 0 0 4px rgba(127, 139, 114, 0.1);
        }

        .search-container {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 18px;
            height: 18px;
        }

        /* ===== CATEGORIES ===== */
        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 0 0 16px;
            scrollbar-width: none;
            -ms-overflow-style: none;
            animation: fadeInUp 0.6s ease 0.3s both;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .cat-btn {
            flex-shrink: 0;
            padding: 10px 20px;
            border-radius: var(--radius-pill);
            border: 1.5px solid var(--brown-300);
            background: var(--bg-card);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .cat-btn:hover {
            border-color: var(--brown-500);
        }

        .cat-btn.active {
            background: var(--brown-800);
            color: white;
            border-color: var(--brown-800);
        }

        /* ===== PRODUCT GRID ===== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            animation: fadeInUp 0.6s ease 0.4s both;
        }

        .product-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        .product-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--sage-600);
            color: white;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .product-img-wrapper {
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
            background: var(--brown-100);
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-img {
            transform: scale(1.05);
        }

        .product-info {
            padding: 12px;
        }

        .product-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .checkout-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--sage-600), var(--sage-700));
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .checkout-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .checkout-btn svg {
            width: 14px;
            height: 14px;
        }

        /* ===== NO RESULTS ===== */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }

        .no-results-emoji {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .no-results-text {
            font-size: 14px;
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            animation: fadeInUp 0.6s ease 0.5s both;
        }

        .footer-text {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .footer-heart {
            color: var(--sage-500);
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Product card stagger animation */
        .product-card {
            opacity: 0;
            animation: fadeInUp 0.5s ease forwards;
        }

        .product-card:nth-child(1) { animation-delay: 0.1s; }
        .product-card:nth-child(2) { animation-delay: 0.15s; }
        .product-card:nth-child(3) { animation-delay: 0.2s; }
        .product-card:nth-child(4) { animation-delay: 0.25s; }
        .product-card:nth-child(5) { animation-delay: 0.3s; }
        .product-card:nth-child(6) { animation-delay: 0.35s; }
        .product-card:nth-child(7) { animation-delay: 0.4s; }
        .product-card:nth-child(8) { animation-delay: 0.45s; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 360px) {
            .product-grid {
                gap: 10px;
            }
            .product-info {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- PROFILE -->
    <header class="profile-header">
        <div class="profile-photo-wrapper">
            <div class="profile-photo">🛍️</div>
            <!-- Ganti dengan: <img class="profile-photo" src="foto-kamu.jpg" alt="tanyaappa"> -->
        </div>
        <h1 class="profile-name">@tanyaappa</h1>
        <p class="profile-bio">Rekomendasi produk favorit Appa, tinggal klik!</p>
        <div class="social-links">
            <a href="https://instagram.com/yogaarizona" target="_blank" class="social-btn" aria-label="Instagram">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
                </svg>
            </a>
        </div>
    </header>

    <!-- SEARCH -->
    <div class="search-wrapper">
        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" class="search-bar" placeholder="Cari produk..." id="searchInput" oninput="filterProducts()">
        </div>
    </div>

    <!-- CATEGORIES -->
    <div class="categories" id="categories">
        <button class="cat-btn active" onclick="setCategory('All')">All</button>
        <button class="cat-btn" onclick="setCategory('Fashion')">Fashion</button>
        <button class="cat-btn" onclick="setCategory('Beauty')">Beauty</button>
        <button class="cat-btn" onclick="setCategory('Home')">Home & Living</button>
        <button class="cat-btn" onclick="setCategory('Gadget')">Gadget</button>
        <button class="cat-btn" onclick="setCategory('Food')">Food & Snack</button>
        <button class="cat-btn" onclick="setCategory('Kids')">Kids</button>
    </div>

    <!-- PRODUCT GRID -->
    <div class="product-grid" id="productGrid"></div>

    <!-- FOOTER -->
    <footer class="footer">
        <p class="footer-text">made with <span class="footer-heart">♥</span> by tanyaappa</p>
    </footer>

</div>

<script>
// ============================================================
//  DATA PRODUK — EDIT DI SINI!
//  Ganti nama, gambar, link, dan kategori sesuai produk kamu
// ============================================================
const products = [
    {
        name: "Parfum Botol Spray 5ml Premium",
        image: "https://placehold.co/400x400/D7CCC8/5C3D2E?text=Parfum+5ml",
        link: "https://shopee.co.id",      // Ganti dengan link affiliate Shopee kamu
        category: "Beauty"
    },
    {
        name: "Topi Korean Style Wanita Anti UV",
        image: "https://placehold.co/400x400/C1D4B9/5F6B5E?text=Topi+Korean",
        link: "https://shopee.co.id",
        category: "Fashion"
    },
    {
        name: "Rak Organizer Dapur Minimalist",
        image: "https://placehold.co/400x400/EFEBE9/795548?text=Rak+Dapur",
        link: "https://shopee.co.id",
        category: "Home"
    },
    {
        name: "TWS Earbuds Bluetooth 5.3 Bass",
        image: "https://placehold.co/400x400/D9E8D2/5F6B5E?text=TWS+Earbuds",
        link: "https://shopee.co.id",
        category: "Gadget"
    },
    {
        name: "Serum Vitamin C Brightening 30ml",
        image: "https://placehold.co/400x400/D7CCC8/5C3D2E?text=Serum+VitC",
        link: "https://shopee.co.id",
        category: "Beauty"
    },
    {
        name: "Keripik Pisang Coklat Premium 250g",
        image: "https://placehold.co/400x400/EFEBE9/795548?text=Keripik+Pisang",
        link: "https://shopee.co.id",
        category: "Food"
    },
    {
        name: "Baju Anak Set Lucu Katun Import",
        image: "https://placehold.co/400x400/C1D4B9/5F6B5E?text=Baju+Anak",
        link: "https://shopee.co.id",
        category: "Kids"
    },
    {
        name: "Phone Holder Magnetic Car Mount",
        image: "https://placehold.co/400x400/D9E8D2/5F6B5E?text=Phone+Holder",
        link: "https://shopee.co.id",
        category: "Gadget"
    }
];

// ============================================================
//  LOGIKA — JANGAN DIUBAH (kecuali kamu ngerti coding)
// ============================================================
let activeCategory = 'All';

function renderProducts(list) {
    const grid = document.getElementById('productGrid');
    if (list.length === 0) {
        grid.innerHTML = `
            <div class="no-results">
                <div class="no-results-emoji">🔍</div>
                <p class="no-results-text">Produknya belum ada nih, coba kata kunci lain ya~</p>
            </div>`;
        return;
    }
    grid.innerHTML = list.map((p, i) => `
        <div class="product-card" style="animation-delay: ${0.05 * i}s">
            <div class="product-badge">${i + 1}</div>
            <div class="product-img-wrapper">
                <img class="product-img" src="${p.image}" alt="${p.name}" loading="lazy">
            </div>
            <div class="product-info">
                <p class="product-name">${p.name}</p>
                <a href="${p.link}" target="_blank" class="checkout-btn">
                    Checkout
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 17l9.2-9.2M17 17V7H7"/>
                    </svg>
                </a>
            </div>
        </div>
    `).join('');
}

function setCategory(cat) {
    activeCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.trim() === cat || 
            (cat === 'All' && btn.textContent.trim() === 'All') ||
            (cat === 'Home' && btn.textContent.trim() === 'Home & Living') ||
            (cat === 'Food' && btn.textContent.trim() === 'Food & Snack'));
    });
    filterProducts();
}

function filterProducts() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    let filtered = products;
    if (activeCategory !== 'All') {
        filtered = filtered.filter(p => p.category === activeCategory);
    }
    if (search) {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(search));
    }
    renderProducts(filtered);
}

// Initial render
renderProducts(products);
</script>

</body>
</html>
